<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khối Hình Puzzle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        :root {
            --bg-color: #1a1a2e;
            --board-bg: #16213e;
            --cell-bg: #0f3460;
            --text-color: #ffffff;
            --primary-color: #e94560;
            
            /* Block Colors - Modern Gradients */
            --color-1: linear-gradient(135deg, #00f2fe, #4facfe); /* Cyan/Blue */
            --color-2: linear-gradient(135deg, #43e97b, #38f9d7); /* Green */
            --color-3: linear-gradient(135deg, #fa709a, #fee140); /* Pink/Yellow */
            --color-4: linear-gradient(135deg, #ff0844, #ffb199); /* Red/Orange */
            --color-5: linear-gradient(135deg, #b224ef, #7579ff); /* Purple */
            --color-6: linear-gradient(135deg, #f83600, #f9d423); /* Orange */
            --color-7: linear-gradient(135deg, #cd9cf2, #f6f3ff); /* Light Purple */

            --shadow-gloss: inset 2px 2px 4px rgba(255, 255, 255, 0.4), inset -2px -2px 4px rgba(0, 0, 0, 0.2), 0 4px 8px rgba(0,0,0,0.3);
            --shadow-flat: inset 0 0 0 rgba(255,255,255,0), 0 0 0 rgba(0,0,0,0);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            touch-action: none; /* Prevent scrolling while playing */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #app {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top, #2a2a4a, var(--bg-color));
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            pointer-events: all;
        }

        /* --- Main Menu & Game Over --- */
        .menu-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: var(--color-3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(250, 112, 154, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .score-display-large {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 2rem;
        }

        .score-display-large span {
            display: block;
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
        }

        .btn {
            background: var(--color-4);
            border: none;
            border-radius: 50px;
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 8, 68, 0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.95) translateY(4px);
            box-shadow: 0 2px 5px rgba(255, 8, 68, 0.3);
        }

        /* --- Game Screen --- */
        #game {
            z-index: 5;
            padding: 1rem;
            justify-content: space-between;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            text-align: center;
            flex: 1;
            margin: 0 0.5rem;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .score-box.highlight {
            animation: pulse 0.3s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); background: rgba(255, 255, 255, 0.3); }
            50% { transform: scale(1.1); background: rgba(255, 255, 255, 0.5); }
            100% { transform: scale(1); background: rgba(255, 255, 255, 0.1); }
        }

        .score-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .btn-small {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Board --- */
        #board-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--board-bg);
            border-radius: 16px;
            padding: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.5);
            margin: auto 0;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            width: 100%;
            height: 100%;
        }

        .cell {
            background: var(--cell-bg);
            border-radius: 6px;
            transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
            position: relative;
        }

        .cell.filled {
            box-shadow: var(--shadow-gloss);
        }

        .cell.preview-valid {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
        }

        .cell.preview-invalid {
            background: rgba(255, 0, 0, 0.4);
            box-shadow: inset 0 0 10px rgba(255,0,0,0.6);
        }

        .cell.clearing {
            animation: clearAnim 0.4s ease-out forwards;
        }

        @keyframes clearAnim {
            0% { transform: scale(1); opacity: 1; filter: brightness(1.5); }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* --- Tray --- */
        #tray {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height: 150px;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px 20px 0 0;
        }

        .tray-slot {
            width: 30%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .shape {
            display: grid;
            gap: 2px;
            cursor: grab;
            touch-action: none;
            /* Default scale for tray */
            transform: scale(0.6);
            transition: transform 0.2s, opacity 0.2s;
        }

        .shape.empty {
            pointer-events: none;
        }

        .shape .block {
            border-radius: 6px;
            box-shadow: var(--shadow-gloss);
        }

        .shape .block.empty-block {
            background: transparent;
            box-shadow: none;
        }

        /* --- Dragged Shape --- */
        #drag-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .dragged-shape {
            position: absolute;
            display: grid;
            gap: 2px;
            transform-origin: center center;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.4));
            /* Slightly larger when dragging */
            transform: scale(1.05); 
            transition: transform 0.1s;
        }

        /* --- Effects --- */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 50;
        }

        #combo-text-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 60;
            pointer-events: none;
        }

        .combo-text {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5), 0 0 20px #ffeb3b;
            animation: comboPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: absolute;
            white-space: nowrap;
            transform: translate(-50%, -50%);
        }

        @keyframes comboPop {
            0% { transform: translate(-50%, -10%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -60%) scale(1); opacity: 1; filter: blur(0px); }
            100% { transform: translate(-50%, -80%) scale(0.8); opacity: 0; filter: blur(4px); }
        }

        .shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

    </style>
</head>
<body>

<div id="app">
    <!-- Main Menu -->
    <div id="main-menu" class="screen active">
        <div class="menu-content">
            <h1>Khối Hình Puzzle</h1>
            <div class="score-display-large">
                Kỷ lục
                <span id="menu-high-score">0</span>
            </div>
            <button class="btn" id="btn-start">Bắt đầu</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game" class="screen">
        <header>
            <div class="score-box">
                <div class="score-label">Điểm</div>
                <div class="score-value" id="current-score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Kỷ lục</div>
                <div class="score-value" id="game-high-score">0</div>
            </div>
            <button class="btn-small" id="btn-restart" title="Chơi lại">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
        </header>

        <div id="board-wrapper">
            <div id="board"></div>
            <div id="combo-text-container"></div>
        </div>

        <div id="tray">
            <div class="tray-slot" id="slot-0"></div>
            <div class="tray-slot" id="slot-1"></div>
            <div class="tray-slot" id="slot-2"></div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="screen">
        <div class="menu-content">
            <h1>Thua rồi!</h1>
            <div class="score-display-large">
                Điểm của bạn
                <span id="final-score">0</span>
            </div>
            <div class="score-display-large" style="font-size: 1rem; margin-bottom: 3rem;">
                Kỷ lục: <span id="go-high-score" style="font-size: 1.5rem; display: inline;">0</span>
            </div>
            <button class="btn" id="btn-play-again">Chơi lại</button>
        </div>
    </div>

    <!-- Container for dragged elements -->
    <div id="drag-container"></div>
</div>

<script>
    /**
     * Audio System (Web Audio API) for generative sounds
     */
    const AudioSys = {
        ctx: null,
        init() {
            if (!this.ctx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
            }
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        playTone(freq, type, duration, vol, slideFreq = null) {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            if (slideFreq) {
                osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
            }
            
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playBGM() {
            // A very subtle, ambient generative background
            if (!this.ctx) return;
            const playNote = () => {
                if(GameState.isGameOver || GameState.currentScreen !== 'game') return;
                const notes = [220, 261.63, 329.63, 392.00, 440, 523.25]; // A minor pentatonic
                const note = notes[Math.floor(Math.random() * notes.length)] / 2;
                this.playTone(note, 'sine', 3, 0.05);
                setTimeout(playNote, Math.random() * 2000 + 1000);
            };
            playNote();
        },
        sfxPlace() {
            this.playTone(400, 'triangle', 0.1, 0.1);
        },
        sfxClear(combo) {
            const baseFreq = 300 + (combo * 100);
            this.playTone(baseFreq, 'square', 0.3, 0.05, baseFreq * 2);
            setTimeout(() => this.playTone(baseFreq * 1.5, 'square', 0.4, 0.05), 50);
        },
        sfxGameOver() {
            this.playTone(300, 'sawtooth', 0.5, 0.1, 100);
            setTimeout(() => this.playTone(250, 'sawtooth', 0.5, 0.1, 50), 300);
        },
        sfxInvalid() {
            this.playTone(150, 'square', 0.1, 0.05);
        }
    };

    /**
     * Shape Definitions
     */
    const SHAPE_DEFS = [
        { matrix: [[1]], color: 'var(--color-1)' }, // 1x1
        { matrix: [[1,1]], color: 'var(--color-2)' }, // 2x1 H
        { matrix: [[1],[1]], color: 'var(--color-2)' }, // 1x2 V
        { matrix: [[1,1,1]], color: 'var(--color-3)' }, // 3x1 H
        { matrix: [[1],[1],[1]], color: 'var(--color-3)' }, // 1x3 V
        { matrix: [[1,1,1,1]], color: 'var(--color-4)' }, // 4x1 H
        { matrix: [[1],[1],[1],[1]], color: 'var(--color-4)' }, // 1x4 V
        { matrix: [[1,1,1,1,1]], color: 'var(--color-5)' }, // 5x1 H
        { matrix: [[1],[1],[1],[1],[1]], color: 'var(--color-5)' }, // 1x5 V
        { matrix: [[1,1],[1,1]], color: 'var(--color-6)' }, // 2x2
        { matrix: [[1,1,1],[1,1,1],[1,1,1]], color: 'var(--color-7)' }, // 3x3
        { matrix: [[1,0],[1,1]], color: 'var(--color-1)' }, // L small 1
        { matrix: [[0,1],[1,1]], color: 'var(--color-1)' }, // L small 2
        { matrix: [[1,1],[1,0]], color: 'var(--color-1)' }, // L small 3
        { matrix: [[1,1],[0,1]], color: 'var(--color-1)' }, // L small 4
        { matrix: [[1,0,0],[1,0,0],[1,1,1]], color: 'var(--color-2)' }, // L big 1
        { matrix: [[0,0,1],[0,0,1],[1,1,1]], color: 'var(--color-2)' }, // L big 2
        { matrix: [[1,1,1],[1,0,0],[1,0,0]], color: 'var(--color-2)' }, // L big 3
        { matrix: [[1,1,1],[0,0,1],[0,0,1]], color: 'var(--color-2)' }, // L big 4
        { matrix: [[1,1,1],[0,1,0],[0,1,0]], color: 'var(--color-3)' }, // T 
        { matrix: [[0,1,0],[1,1,1],[0,0,0]], color: 'var(--color-3)' }, // T up
        { matrix: [[1,1,0],[0,1,1]], color: 'var(--color-4)' }, // Z 1
        { matrix: [[0,1,1],[1,1,0]], color: 'var(--color-4)' }, // Z 2
        { matrix: [[1,0],[1,1],[0,1]], color: 'var(--color-4)' }, // Z 3
        { matrix: [[0,1],[1,1],[1,0]], color: 'var(--color-4)' }  // Z 4
    ];

    /**
     * Game State & Logic
     */
    const GameState = {
        board: Array(8).fill().map(() => Array(8).fill(null)),
        score: 0,
        highScore: parseInt(localStorage.getItem('blockBlastHighScore') || '0'),
        trayBlocks: [null, null, null],
        isGameOver: false,
        currentScreen: 'main-menu'
    };

    // DOM Elements
    const els = {
        screens: document.querySelectorAll('.screen'),
        board: document.getElementById('board'),
        boardWrapper: document.getElementById('board-wrapper'),
        traySlots: [
            document.getElementById('slot-0'),
            document.getElementById('slot-1'),
            document.getElementById('slot-2')
        ],
        dragContainer: document.getElementById('drag-container'),
        scoreDisplay: document.getElementById('current-score'),
        scoreBox: document.querySelector('.score-box'),
        highScoreDisplays: [
            document.getElementById('menu-high-score'),
            document.getElementById('game-high-score'),
            document.getElementById('go-high-score')
        ],
        finalScore: document.getElementById('final-score'),
        comboContainer: document.getElementById('combo-text-container'),
        btnStart: document.getElementById('btn-start'),
        btnRestart: document.getElementById('btn-restart'),
        btnPlayAgain: document.getElementById('btn-play-again')
    };

    // Drag State
    const DragState = {
        active: false,
        element: null,
        shape: null,
        slotIndex: -1,
        offsetX: 0,
        offsetY: 0,
        currentBoardX: -1,
        currentBoardY: -1,
        cellSize: 0,
        boardRect: null
    };

    /**
     * Initialization
     */
    function init() {
        updateHighScores();
        createBoardCells();
        setupEventListeners();
    }

    function switchScreen(screenId) {
        els.screens.forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        GameState.currentScreen = screenId;
    }

    function createBoardCells() {
        els.board.innerHTML = '';
        for (let y = 0; y < 8; y++) {
            for (let x = 0; x < 8; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${x}-${y}`;
                els.board.appendChild(cell);
            }
        }
    }

    function updateHighScores() {
        els.highScoreDisplays.forEach(el => el.textContent = GameState.highScore);
    }

    function updateScore(points) {
        GameState.score += points;
        els.scoreDisplay.textContent = GameState.score;
        els.scoreBox.classList.remove('highlight');
        void els.scoreBox.offsetWidth; // trigger reflow
        els.scoreBox.classList.add('highlight');

        if (GameState.score > GameState.highScore) {
            GameState.highScore = GameState.score;
            localStorage.setItem('blockBlastHighScore', GameState.highScore);
            updateHighScores();
        }
    }

    function startGame() {
        AudioSys.init();
        AudioSys.playBGM();
        
        GameState.board = Array(8).fill().map(() => Array(8).fill(null));
        GameState.score = 0;
        GameState.isGameOver = false;
        
        updateScore(0);
        renderBoard();
        generateTray();
        switchScreen('game');
    }

    function gameOver() {
        GameState.isGameOver = true;
        AudioSys.sfxGameOver();
        els.finalScore.textContent = GameState.score;
        switchScreen('game-over');
    }

    function generateTray() {
        let allEmpty = true;
        for (let i = 0; i < 3; i++) {
            if (GameState.trayBlocks[i] !== null) {
                allEmpty = false;
                break;
            }
        }

        if (allEmpty) {
            for (let i = 0; i < 3; i++) {
                const randShape = SHAPE_DEFS[Math.floor(Math.random() * SHAPE_DEFS.length)];
                GameState.trayBlocks[i] = randShape;
                renderTraySlot(i, randShape);
            }
        }
        
        // Delay game over check slightly for rendering to finish
        setTimeout(checkGameOver, 100);
    }

    function renderTraySlot(index, shapeDef) {
        const slot = els.traySlots[index];
        slot.innerHTML = '';
        if (!shapeDef) return;

        const shapeEl = createShapeElement(shapeDef);
        shapeEl.dataset.slotIndex = index;
        
        // Setup interaction
        shapeEl.addEventListener('pointerdown', handlePointerDown);
        
        slot.appendChild(shapeEl);
    }

    function createShapeElement(shapeDef) {
        const shapeEl = document.createElement('div');
        shapeEl.className = 'shape';
        
        const rows = shapeDef.matrix.length;
        const cols = shapeDef.matrix[0].length;
        
        shapeEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        shapeEl.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

        // For sizing the drag preview properly
        const boardWidth = els.board.offsetWidth;
        const gap = 2; // matches CSS gap
        const cellSize = (boardWidth - (7 * gap)) / 8;

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                const block = document.createElement('div');
                block.className = 'block';
                block.style.width = `${cellSize}px`;
                block.style.height = `${cellSize}px`;
                
                if (shapeDef.matrix[y][x] === 1) {
                    block.style.background = shapeDef.color;
                } else {
                    block.classList.add('empty-block');
                }
                shapeEl.appendChild(block);
            }
        }
        return shapeEl;
    }

    function renderBoard() {
        for (let y = 0; y < 8; y++) {
            for (let x = 0; x < 8; x++) {
                const cell = document.getElementById(`cell-${x}-${y}`);
                cell.className = 'cell'; // reset classes
                cell.style.background = '';
                
                if (GameState.board[y][x]) {
                    cell.classList.add('filled');
                    cell.style.background = GameState.board[y][x];
                }
            }
        }
    }

    /**
     * Drag and Drop Logic
     */
    function handlePointerDown(e) {
        if (GameState.isGameOver) return;
        
        const shapeEl = e.currentTarget;
        const slotIndex = parseInt(shapeEl.dataset.slotIndex);
        const shapeDef = GameState.trayBlocks[slotIndex];
        
        if (!shapeDef) return;

        // Init audio on first interaction if needed
        AudioSys.init();

        DragState.active = true;
        DragState.shape = shapeDef;
        DragState.slotIndex = slotIndex;
        
        // Calculate cell size based on current board
        const boardWidth = els.board.offsetWidth;
        const gap = 2;
        DragState.cellSize = (boardWidth - (7 * gap)) / 8;
        DragState.boardRect = els.board.getBoundingClientRect();

        // Create draggable clone
        const clone = createShapeElement(shapeDef);
        clone.classList.add('dragged-shape');
        
        // Hide original
        shapeEl.style.opacity = '0';

        // Calculate offset so finger doesn't cover the block on mobile
        const isTouch = e.pointerType === 'touch';
        
        // Center of the shape logic
        const shapeWidth = shapeDef.matrix[0].length * DragState.cellSize + (shapeDef.matrix[0].length - 1) * gap;
        const shapeHeight = shapeDef.matrix.length * DragState.cellSize + (shapeDef.matrix.length - 1) * gap;
        
        DragState.offsetX = shapeWidth / 2;
        DragState.offsetY = isTouch ? shapeHeight + 40 : shapeHeight / 2; // Offset higher on touch

        updateDragPosition(e.clientX, e.clientY, clone);
        
        els.dragContainer.appendChild(clone);
        DragState.element = clone;

        document.addEventListener('pointermove', handlePointerMove, { passive: false });
        document.addEventListener('pointerup', handlePointerUp);
        document.addEventListener('pointercancel', handlePointerUp);
    }

    function handlePointerMove(e) {
        if (!DragState.active) return;
        e.preventDefault(); // Prevent scrolling
        
        updateDragPosition(e.clientX, e.clientY, DragState.element);
        
        // Check intersection with board
        const boardX = Math.floor((e.clientX - DragState.offsetX - DragState.boardRect.left + (DragState.cellSize/2)) / (DragState.cellSize + 2));
        const boardY = Math.floor((e.clientY - DragState.offsetY - DragState.boardRect.top + (DragState.cellSize/2)) / (DragState.cellSize + 2));

        if (boardX !== DragState.currentBoardX || boardY !== DragState.currentBoardY) {
            DragState.currentBoardX = boardX;
            DragState.currentBoardY = boardY;
            updatePreview(boardX, boardY);
        }
    }

    function updateDragPosition(clientX, clientY, el) {
        el.style.left = `${clientX - DragState.offsetX}px`;
        el.style.top = `${clientY - DragState.offsetY}px`;
    }

    function updatePreview(startX, startY) {
        // Clear old preview
        document.querySelectorAll('.cell').forEach(c => {
            c.classList.remove('preview-valid', 'preview-invalid');
        });

        const shape = DragState.shape.matrix;
        const isValid = canPlaceShape(shape, startX, startY);

        for (let y = 0; y < shape.length; y++) {
            for (let x = 0; x < shape[y].length; x++) {
                if (shape[y][x] === 1) {
                    const bx = startX + x;
                    const by = startY + y;
                    
                    if (bx >= 0 && bx < 8 && by >= 0 && by < 8) {
                        const cell = document.getElementById(`cell-${bx}-${by}`);
                        if (isValid) {
                            cell.classList.add('preview-valid');
                        } else {
                            cell.classList.add('preview-invalid');
                        }
                    }
                }
            }
        }
    }

    function handlePointerUp(e) {
        if (!DragState.active) return;

        document.removeEventListener('pointermove', handlePointerMove);
        document.removeEventListener('pointerup', handlePointerUp);
        document.removeEventListener('pointercancel', handlePointerUp);

        // Clear preview
        document.querySelectorAll('.cell').forEach(c => {
            c.classList.remove('preview-valid', 'preview-invalid');
        });

        const shape = DragState.shape.matrix;
        const color = DragState.shape.color;
        const startX = DragState.currentBoardX;
        const startY = DragState.currentBoardY;

        if (canPlaceShape(shape, startX, startY)) {
            // Place shape
            placeShape(shape, color, startX, startY);
            AudioSys.sfxPlace();
            
            // Remove from tray
            GameState.trayBlocks[DragState.slotIndex] = null;
            els.traySlots[DragState.slotIndex].innerHTML = '';
            
            // Clean up drag element immediately
            if (DragState.element) DragState.element.remove();
            
            // Check for clears
            checkLines();
            
            // Respawn tray if needed
            generateTray();
        } else {
            // Snap back animation
            AudioSys.sfxInvalid();
            const originalSlot = els.traySlots[DragState.slotIndex].querySelector('.shape');
            
            if (DragState.element && originalSlot) {
                const rect = originalSlot.getBoundingClientRect();
                DragState.element.style.transition = 'all 0.2s ease-out';
                DragState.element.style.left = `${rect.left}px`;
                DragState.element.style.top = `${rect.top}px`;
                DragState.element.style.transform = 'scale(0.6)';
                
                setTimeout(() => {
                    originalSlot.style.opacity = '1';
                    if (DragState.element) DragState.element.remove();
                }, 200);
            } else {
                 if (DragState.element) DragState.element.remove();
            }
        }

        DragState.active = false;
        DragState.element = null;
        DragState.currentBoardX = -1;
        DragState.currentBoardY = -1;
    }

    function canPlaceShape(shape, startX, startY) {
        for (let y = 0; y < shape.length; y++) {
            for (let x = 0; x < shape[y].length; x++) {
                if (shape[y][x] === 1) {
                    const bx = startX + x;
                    const by = startY + y;
                    
                    if (bx < 0 || bx >= 8 || by < 0 || by >= 8) return false; // Out of bounds
                    if (GameState.board[by][bx] !== null) return false; // Collision
                }
            }
        }
        return true;
    }

    function placeShape(shape, color, startX, startY) {
        updateScore(shape.flat().filter(v => v === 1).length); // Points for placing
        
        for (let y = 0; y < shape.length; y++) {
            for (let x = 0; x < shape[y].length; x++) {
                if (shape[y][x] === 1) {
                    GameState.board[startY + y][startX + x] = color;
                }
            }
        }
        renderBoard();
    }

    /**
     * Line Clearing & Scoring
     */
    function checkLines() {
        const rowsToClear = [];
        const colsToClear = [];

        // Check rows
        for (let y = 0; y < 8; y++) {
            let full = true;
            for (let x = 0; x < 8; x++) {
                if (GameState.board[y][x] === null) full = false;
            }
            if (full) rowsToClear.push(y);
        }

        // Check columns
        for (let x = 0; x < 8; x++) {
            let full = true;
            for (let y = 0; y < 8; y++) {
                if (GameState.board[y][x] === null) full = false;
            }
            if (full) colsToClear.push(x);
        }

        const totalLines = rowsToClear.length + colsToClear.length;

        if (totalLines > 0) {
            handleClears(rowsToClear, colsToClear, totalLines);
        }
    }

    function handleClears(rows, cols, totalLines) {
        AudioSys.sfxClear(totalLines);
        
        // Screen Shake
        els.boardWrapper.classList.remove('shake');
        void els.boardWrapper.offsetWidth;
        els.boardWrapper.classList.add('shake');

        const cellsToClear = new Set();
        
        rows.forEach(y => {
            for(let x=0; x<8; x++) cellsToClear.add(`${x},${y}`);
        });
        cols.forEach(x => {
            for(let y=0; y<8; y++) cellsToClear.add(`${x},${y}`);
        });

        // Scoring
        const basePoints = 10;
        let points = totalLines * basePoints * totalLines; // Combo multiplier built-in
        updateScore(points);

        // Combo UI
        if (totalLines > 1) {
            showComboText(totalLines);
        }

        // Animate and clear
        cellsToClear.forEach(coord => {
            const [x, y] = coord.split(',').map(Number);
            const cell = document.getElementById(`cell-${x}-${y}`);
            
            // Spawn particles
            spawnParticles(cell, GameState.board[y][x]);
            
            cell.classList.add('clearing');
            GameState.board[y][x] = null;
        });

        setTimeout(() => {
            cellsToClear.forEach(coord => {
                const [x, y] = coord.split(',').map(Number);
                const cell = document.getElementById(`cell-${x}-${y}`);
                cell.classList.remove('clearing');
            });
            renderBoard();
        }, 400); // Wait for animation
    }

    function showComboText(combo) {
        const text = document.createElement('div');
        text.className = 'combo-text';
        text.textContent = `Combo x${combo}!`;
        els.comboContainer.appendChild(text);
        
        setTimeout(() => {
            text.remove();
        }, 1000);
    }

    function spawnParticles(cellElement, color) {
        const rect = cellElement.getBoundingClientRect();
        const boardRect = els.boardWrapper.getBoundingClientRect();
        
        // Relative to board-wrapper
        const centerX = rect.left - boardRect.left + rect.width / 2;
        const centerY = rect.top - boardRect.top + rect.height / 2;

        // Parse gradient to a solid color approx for particles (or just use white/cyan)
        let ptColor = '#fff';
        if (color && color.includes('#')) {
            const matches = color.match(/#[a-zA-Z0-9]{6}/g);
            if(matches) ptColor = matches[0];
        }

        for (let i = 0; i < 5; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.background = ptColor;
            p.style.width = `${Math.random() * 8 + 4}px`;
            p.style.height = p.style.width;
            p.style.left = `${centerX}px`;
            p.style.top = `${centerY}px`;
            p.style.boxShadow = `0 0 10px ${ptColor}`;
            
            els.boardWrapper.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 50 + 20;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity;

            p.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
            ], {
                duration: 500 + Math.random() * 300,
                easing: 'cubic-bezier(0, .9, .57, 1)'
            }).onfinish = () => p.remove();
        }
    }

    /**
     * Game Over Check
     */
    function checkGameOver() {
        let canPlaceAny = false;

        for (let i = 0; i < 3; i++) {
            const shapeDef = GameState.trayBlocks[i];
            if (!shapeDef) continue;

            const shape = shapeDef.matrix;
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    if (canPlaceShape(shape, x, y)) {
                        canPlaceAny = true;
                        break;
                    }
                }
                if (canPlaceAny) break;
            }
            if (canPlaceAny) break;
        }

        if (!canPlaceAny) {
            gameOver();
        }
    }

    /**
     * Event Listeners
     */
    function setupEventListeners() {
        els.btnStart.addEventListener('click', startGame);
        els.btnRestart.addEventListener('click', startGame);
        els.btnPlayAgain.addEventListener('click', startGame);

        // Prevent default context menu and behaviors
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Handle window resize dynamically to ensure sizes are correct
        window.addEventListener('resize', () => {
            if(GameState.currentScreen === 'game') {
                renderBoard(); // Force reflow
            }
        });
    }

    // Run Init
    init();

</script>
